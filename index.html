<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Penentuan Kelayakan Pemberian Kredit</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="page">
        <section class="card">
            <div class="hero">
                <h1>Sistem Penentuan Kelayakan Pemberian Kredit</h1>
                <p class="description">
                    Sistem ini menghitung bobot, skor rata-rata, rule keputusan, dan status kelayakan kredit nasabah.
                </p>
            </div>

            <div id="errorBox" class="alert alert-error hidden" role="alert"></div>

            <form id="creditForm" class="form-grid" novalidate>
                <div class="field field-full">
                    <label for="nama">Nama Nasabah</label>
                    <input type="text" id="nama" name="nama" placeholder="Masukkan nama nasabah" required>
                </div>

                <div class="field">
                    <label for="jenis_nasabah">Jenis Nasabah</label>
                    <select id="jenis_nasabah" name="jenis_nasabah" required>
                        <option value="">Pilih jenis nasabah</option>
                        <option value="Rekomendasi">Rekomendasi</option>
                        <option value="Baru">Baru</option>
                        <option value="Bermasalah">Bermasalah</option>
                        <option value="Blacklist">Blacklist</option>
                    </select>
                </div>

                <div class="field">
                    <label for="penghasilan">Penghasilan per Bulan</label>
                    <input type="number" id="penghasilan" name="penghasilan" min="0" step="1" placeholder="Contoh: 3000000" required>
                </div>

                <div class="field">
                    <label for="jaminan">Jaminan</label>
                    <select id="jaminan" name="jaminan" required>
                        <option value="">Pilih jaminan</option>
                        <option value="Sertifikat">Sertifikat</option>
                        <option value="BPKB Mobil">BPKB Mobil</option>
                        <option value="BPKB Motor">BPKB Motor</option>
                        <option value="Tanah">Tanah</option>
                    </select>
                </div>

                <div class="field">
                    <label for="tanggungan">Jumlah Tanggungan</label>
                    <input type="number" id="tanggungan" name="tanggungan" min="0" step="1" placeholder="Contoh: 2" required>
                </div>

                <div class="field">
                    <label for="pekerjaan">Pekerjaan</label>
                    <select id="pekerjaan" name="pekerjaan" required>
                        <option value="">Pilih pekerjaan</option>
                        <option value="Karyawan">Karyawan</option>
                        <option value="Karyawan Kontrak">Karyawan Kontrak</option>
                        <option value="Usaha Sendiri">Usaha Sendiri</option>
                        <option value="Usaha Keluarga">Usaha Keluarga</option>
                        <option value="Usaha Kecil">Usaha Kecil</option>
                    </select>
                </div>

                <div class="field">
                    <label for="pengajuan">Jumlah Pengajuan Kredit</label>
                    <input type="number" id="pengajuan" name="pengajuan" min="1" step="1" placeholder="Contoh: 5000000" required>
                </div>

                <button type="submit" class="button-primary">Analisis Sekarang</button>
            </form>

            <section id="resultSection" class="hidden" aria-live="polite">
                <div id="resultBox" class="result-box">
                    <h2 id="resultTitle"></h2>
                    <p id="resultRule"></p>
                </div>

                <div class="summary">
                    <h3>Ringkasan Hasil</h3>
                    <dl id="summaryList" class="summary-list"></dl>
                </div>

                <div class="summary score-box">
                    <h3>Rincian Bobot</h3>
                    <dl id="scoreList" class="summary-list"></dl>
                </div>

                <div class="actions">
                    <button type="button" id="resetButton" class="button-secondary">Analisis Lagi</button>
                </div>
            </section>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
